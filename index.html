<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساعة الحظ - مسابقة الألغاز</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #f59e0b;
            --accent-hover: #d97706;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #b45309, #d97706);
            padding: 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .riddle-box {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .riddle-title {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .riddle-text {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-color);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            text-align: center;
            margin-top: 4px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 30px 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .success-icon {
            font-size: 3rem;
            color: var(--success-color);
            margin-bottom: 12px;
        }

        .success-message h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--success-color);
        }

        .success-message p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>ساعة الحظ ⏳</h1>
            <p>أجب عن اللغز واربح الجائزة الفورية</p>
        </div>

        <div class="content" id="form-container">
            <!-- صندوق اللغز -->
            <div class="riddle-box">
                <div class="riddle-title">✨ لغز اليوم:</div>
                <div class="riddle-text" id="riddle-content">
                    ما هو الشيء الذي كلما أخذت منه كبر وكلما وضعت فيه صغر؟
                </div>
            </div>

            <!-- نموذج الإرسال المرتبط بـ Formspree -->
            <form id="quiz-form" action="https://formspree.io/f/mjgnavro" method="POST">
                <div class="form-group" style="margin-bottom: 12px;">
                    <label for="answer">إجابتك:</label>
                    <textarea id="answer" name="answer" placeholder="اكتب إجابتك هنا..." required></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="wallet">رقم المحفظة (فودافون كاش / InstaPay):</label>
                    <input type="text" id="wallet" name="wallet" placeholder="010xxxxxxxx أو المعرف" required>
                </div>

                <button type="submit" class="btn" id="submit-btn">إرسال الإجابة 🚀</button>
            </form>
        </div>

        <!-- رسالة النجاح (اختيارية في حال التحويل المباشر) -->
        <div class="success-message" id="success-view">
            <div class="success-icon">✅</div>
            <h2>تم إرسال إجابتك بنجاح!</h2>
            <p>تم استلام إجابتك ورقم محفظتك بنجاح عبر البريد. انتظر إعلان الفائزين قريباً في بوت تيليجرام.</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ملاحظة: Formspree بشكل افتراضي ينقل المستخدم لصفحة شكر خاصة به، 
        // ولكن الكود يعمل بكفاءة تامة في إرسال البيانات لبريدك فور الضغط على زر الإرسال.
    </script>
</body>
</html>
