<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة Lucky Hour</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: Tahoma, sans-serif; 
            background: #0f172a; 
            color: #fff; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 480px; 
            margin: auto; 
        }
        .card { 
            background: #1e293b; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0; 
            border-radius: 5px; 
            border: none; 
            box-sizing: border-box; 
            background: #334155;
            color: #fff;
        }
        input:focus, textarea:focus {
            outline: 2px solid #3b82f6;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        button:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        .comment-box { 
            background: #334155; 
            padding: 10px; 
            border-radius: 5px; 
            margin-top: 8px; 
            font-size: 14px; 
            border-right: 3px solid #3b82f6;
        }
        h2, h3 {
            margin-top: 0;
            color: #f8fafc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 مسابقة Lucky Hour</h2>
    
    <!-- نموذج المشاركة -->
    <div class="card" id="form-card">
        <h3>أجب واربح!</h3>
        <form id="quizForm">
            <input type="text" id="userName" placeholder="اسمك أو معرفك" required>
            <textarea id="userAnswer" placeholder="اكتب إجابتك أو تعليقك هنا..." rows="3" required></textarea>
            <button type="submit" id="submitBtn">إرسال المشاركة 🚀</button>
        </form>
    </div>

    <!-- قسم التعليقات الحية الفورية (Social Proof) -->
    <div class="card">
        <h3>🔥 آخر المشاركات الحية</h3>
        <div id="commentsList">جاري تحميل المشاركات...</div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // رابط الـ Web App الخاص بك على Google Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFfj4ripIxSrFmFul-N_vSfkAJJgnblG-sniL3EwVVjha8YcqMc14qe1cysBe4gqWfkQ/exec";

    const form = document.getElementById('quizForm');
    const commentsList = document.getElementById('commentsList');

    // إرسال الإجابة وحفظها في Google Sheets
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "جاري الإرسال...";

        const data = {
            name: document.getElementById('userName').value,
            answer: document.getElementById('userAnswer').value
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // لتجاوز قيود الـ CORS عند الاتصال بـ Google Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            alert('تم إرسال مشاركتك بنجاح! 🎉');
            form.reset();
            
            // الانتظار قليلاً ثم تحديث قائمة التعليقات لعرض المشاركة الجديدة
            setTimeout(loadComments, 1500);
        } catch (error) {
            alert('حدث خطأ أثناء الإرسال، حاول مرة أخرى.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'إرسال المشاركة 🚀';
        }
    });

    // دالة لجلب وعرض التعليقات الحية من Google Sheets
    async function loadComments() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            if (!data || data.length === 0) {
                commentsList.innerHTML = '<p>كن أول المشاركين الآن!</p>';
                return;
            }

            commentsList.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'comment-box';
                div.innerHTML = `<strong>${escapeHtml(item.name)}:</strong> ${escapeHtml(item.answer)}`;
                commentsList.appendChild(div);
            });
        } catch (error) {
            commentsList.innerHTML = '<p>تعذر تحميل التعليقات الحية حالياً.</p>';
        }
    }

    // دالة لتنظيف النصوص وحمايتها من الأكواد الخبيثة
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g, "&amp;")
                   .replace(/</g, "&lt;")
                   .replace(/>/g, "&gt;")
                   .replace(/"/g, "&quot;")
                   .replace(/'/g, "&#039;");
    }

    // جلب التعليقات عند فتح الصفحة لأول مرة
    loadComments();
    
    // تحديث التعليقات تلقائياً كل 10 ثوانٍ لتبقى حية وفورية
    setInterval(loadComments, 10000);
</script>

</body>
</html>
